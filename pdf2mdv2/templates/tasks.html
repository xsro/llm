<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 任务列表</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* ---- stats ---- */
        .stats { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 14px 24px; border-radius: 10px; flex: 1; text-align: center;
        }
        .stat-item.converted { background: linear-gradient(135deg, #6610f2 0%, #7c3aed 100%); }
        .stat-item.completed { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
        .stat-item.failed    { background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%); }
        .stat-value { font-size: 26px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.85; }

        /* ---- header bar ---- */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }
        .topbar h1 { margin: 0; font-size: 24px; }
        .topbar-actions { display: flex; gap: 10px; align-items: center; }
        .btn-sm {
            padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 13px; font-weight: 500; white-space: nowrap;
        }
        .btn-refresh    { background: #667eea; color: #fff; }
        .btn-refresh:hover { background: #5a6fd6; }
        .auto-refresh    { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; }
        .auto-refresh input { accent-color: #667eea; }

        .back-link { color: #667eea; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }

        /* ---- task table ---- */
        .task-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .task-table th {
            text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600;
            color: #888; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .task-table td { padding: 0; }

        .task-row {
            background: #f8f9fb; border-radius: 8px; display: grid;
            grid-template-columns: 40px 1fr 180px 120px 140px 160px;
            align-items: center; gap: 0; min-height: 56px;
            border-left: 4px solid #ddd; transition: box-shadow 0.15s;
        }
        .task-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }

        .task-row.pending     { border-left-color: #6c757d; }
        .task-row.converting  { border-left-color: #17a2b8; }
        .task-row.converted   { border-left-color: #6610f2; }
        .task-row.uploading   { border-left-color: #fd7e14; }
        .task-row.completed   { border-left-color: #28a745; }
        .task-row.failed      { border-left-color: #dc3545; }

        .task-row__icon    { padding: 0 8px; font-size: 18px; text-align: center; }
        .task-row__info    { padding: 10px 0; min-width: 0; }
        .task-row__status  { padding: 0 12px; text-align: center; }
        .task-row__prog    { padding: 0 12px; }
        .task-row__time    { padding: 0 12px; font-size: 12px; color: #888; text-align: right; }
        .task-row__actions { padding: 0 12px; display: flex; gap: 6px; justify-content: flex-end; }

        .file-name   { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta   { font-size: 11px; color: #999; margin-top: 2px; display: flex; gap: 16px; }
        .file-meta span { white-space: nowrap; }

        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 500; white-space: nowrap;
        }
        .badge-pending    { background: #e9ecef; color: #495057; }
        .badge-converting { background: #d1ecf1; color: #0c5460; }
        .badge-converted  { background: #e2d9f3; color: #6f42c1; }
        .badge-uploading  { background: #ffe5d0; color: #d63384; }
        .badge-completed  { background: #d4edda; color: #155724; }
        .badge-failed     { background: #f8d7da; color: #721c24; }

        .mini-progress       { height: 6px; background: #e9ecef; border-radius: 3px; overflow: hidden; width: 100%; }
        .mini-progress-fill  { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width .3s; }
        .prog-text           { font-size: 11px; color: #888; text-align: right; margin-top: 3px; }

        .btn-action {
            padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer;
            font-size: 11px; white-space: nowrap; font-weight: 500;
        }
        .btn-upload  { background: #6610f2; color: #fff; }
        .btn-upload:hover  { background: #520dc2; }
        .btn-retry   { background: #dc3545; color: #fff; }
        .btn-retry:hover   { background: #c82333; }
        .btn-reupload { background: #28a745; color: #fff; }
        .btn-reupload:hover { background: #1e7e34; }

        /* expanded row for error */
        .task-row-detail {
            background: #fff3f3; padding: 8px 40px 8px 44px; border-radius: 0 0 8px 8px;
            margin-top: -8px; font-size: 12px; color: #c0392b;
        }

        /* responsive: stack on small screens */
        @media (max-width: 900px) {
            .task-row {
                grid-template-columns: 40px 1fr 100px;
                grid-template-rows: auto auto auto;
            }
            .task-row__prog   { grid-column: 1 / -1; padding: 4px 12px 8px; }
            .task-row__time   { grid-column: 1 / -1; text-align: left; padding: 0 12px 4px; font-size: 11px; }
            .task-row__actions{ grid-column: 1 / -1; justify-content: flex-start; padding: 0 12px 8px; }
        }

        .empty-state { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container container-wide">
        <a href="/" class="back-link">← 返回上传</a>

        <div class="topbar">
            <h1>📋 任务列表</h1>
            <div class="topbar-actions">
                <label class="auto-refresh">
                    <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()">
                    自动刷新
                </label>
                <button class="btn-sm btn-refresh" onclick="refreshTasks()">🔄 立即刷新</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-item converted">
                <div class="stat-value" id="convertedCount">-</div>
                <div class="stat-label">转换完成</div>
            </div>
            <div class="stat-item completed">
                <div class="stat-value" id="completedCount">-</div>
                <div class="stat-label">已上传</div>
            </div>
            <div class="stat-item failed">
                <div class="stat-value" id="failedCount">-</div>
                <div class="stat-label">失败</div>
            </div>
        </div>

        <div id="taskList">
            <div class="empty-state"><div class="icon">⏳</div>加载中...</div>
        </div>
    </div>

    <script>
        const STATUS_LABEL = {
            pending:    '等待中',
            converting: '转换中',
            converted:  '转换完成',
            uploading:  '上传中',
            completed:  '已上传',
            failed:     '失败',
        };

        const ICONS = {
            pending:    '⏳',
            converting: '⚙️',
            converted:  '📄',
            uploading:  '📤',
            completed:  '✅',
            failed:     '❌',
        };

        let autoRefreshTimer = null;

        function toggleAutoRefresh() {
            const on = document.getElementById('autoRefresh').checked;
            if (on) {
                autoRefreshTimer = setInterval(refreshTasks, 3000);
                refreshTasks();
            } else {
                clearInterval(autoRefreshTimer);
            }
        }

        function formatTime(ts) {
            if (!ts) return '-';
            const d = new Date(ts * 1000);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function refreshTasks() {
            fetch('/api/tasks')
                .then(r => r.json())
                .then(data => {
                    renderTasks(data.tasks);
                    updateStats(data.tasks);
                })
                .catch(() => {
                    document.getElementById('taskList').innerHTML =
                        '<div class="empty-state"><div class="icon">⚠️</div>加载失败</div>';
                });
        }

        function updateStats(tasks) {
            document.getElementById('totalCount').textContent    = tasks.length;
            document.getElementById('completedCount').textContent = tasks.filter(t => t.status === 'completed').length;
            document.getElementById('convertedCount').textContent = tasks.filter(t => t.status === 'converted').length;
            document.getElementById('failedCount').textContent    = tasks.filter(t => t.status === 'failed').length;
        }

        function retryTask(taskId) {
            if (!confirm('确定要重试此任务吗？')) return;
            fetch(`/api/tasks/${taskId}/retry`, { method: 'POST' })
                .then(r => r.json())
                .then(data => data.success ? refreshTasks() : alert(data.error))
                .catch(err => alert('重试失败: ' + err));
        }

        function uploadTask(taskId) {
            if (!confirm('确定要上传此文件到 OpenWebUI 吗？')) return;
            fetch(`/api/tasks/${taskId}/upload`, { method: 'POST' })
                .then(r => r.json())
                .then(data => data.success ? refreshTasks() : alert(data.error))
                .catch(err => alert('上传失败: ' + err));
        }

        function renderTasks(tasks) {
            const container = document.getElementById('taskList');
            if (!tasks.length) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无任务</div>';
                return;
            }

            const header = `
                <div class="task-table-header" style="display:flex;padding:0 40px 0 44px;gap:0;">
                    <span style="width:40px;"></span>
                    <span style="flex:1;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;">文件</span>
                    <span style="width:180px;text-align:center;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;">状态</span>
                    <span style="width:120px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;">进度</span>
                    <span style="width:140px;text-align:right;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;">创建时间</span>
                    <span style="width:160px;text-align:right;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;">操作</span>
                </div>
            `;

            const rows = tasks.map(task => {
                const s = task.status;
                const prog = task.progress != null ? task.progress : 0;
                const showProg = s !== 'completed' && s !== 'failed';
                const error = task.error || '';

                let actions = '';
                if (s === 'converted') {
                    actions = `<button class="btn-action btn-upload" onclick="uploadTask('${task.id}')">📤 上传</button>`;
                } else if (s === 'completed') {
                    actions = `<button class="btn-action btn-reupload" onclick="retryTask('${task.id}')">🔄 重传</button>`;
                } else if (s === 'failed') {
                    actions = `<button class="btn-action btn-retry" onclick="retryTask('${task.id}')">🔄 重试</button>`;
                }

                const metaParts = [
                    `<span>ID: ${task.id}</span>`,
                ];
                if (task.knowledge_id) {
                    // show up to 16 chars of knowledge id
                    const kid = task.knowledge_id.length > 16
                        ? task.knowledge_id.substring(0, 14) + '...'
                        : task.knowledge_id;
                    metaParts.push(`<span>知识库: ${kid}</span>`);
                }

                let html = `
                <div class="task-row ${s}">
                    <div class="task-row__icon">${ICONS[s] || '📌'}</div>
                    <div class="task-row__info">
                        <div class="file-name" title="${task.file_name}">${task.file_name}</div>
                        <div class="file-meta">${metaParts.join('')}</div>
                    </div>
                    <div class="task-row__status">
                        <span class="badge badge-${s}">${STATUS_LABEL[s] || s}</span>
                    </div>
                    <div class="task-row__prog">
                        ${showProg ? `
                        <div class="mini-progress"><div class="mini-progress-fill" style="width:${prog}%"></div></div>
                        <div class="prog-text">${prog}%</div>
                        ` : '<div class="prog-text">-</div>'}
                    </div>
                    <div class="task-row__time">${formatTime(task.created_at)}</div>
                    <div class="task-row__actions">${actions}</div>
                </div>`;

                if (error) {
                    html += `<div class="task-row-detail">❌ ${error}</div>`;
                }

                return html;
            }).join('');

            container.innerHTML = header + '<div style="margin-top:4px;">' + rows + '</div>';
        }

        // ---- init ----
        refreshTasks();
        toggleAutoRefresh();
    </script>
</body>
</html>
