<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 任务列表</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .task-list { margin-top: 20px; }
        .task-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ddd;
        }
        .task-item.queued { border-left-color: #ffc107; }
        .task-item.converting { border-left-color: #17a2b8; }
        .task-item.completed { border-left-color: #28a745; }
        .task-item.failed { border-left-color: #dc3545; }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .task-file { font-weight: 600; font-size: 16px; }
        .task-id { font-size: 12px; color: #666; }
        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-queued { background: #fff3cd; color: #856404; }
        .status-converting { background: #d1ecf1; color: #0c5460; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        .task-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
        }
        .task-error {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 6px;
            color: #dc3545;
            font-size: 13px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }
        .stat-item.completed { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
        .stat-item.failed { background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%); }
        .stat-value { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 13px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回上传</a>

        <div class="header">
            <h1>📋 任务列表</h1>
            <button onclick="refreshTasks()" class="btn-secondary">🔄 刷新</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-item completed">
                <div class="stat-value" id="completedCount">-</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-item failed">
                <div class="stat-value" id="failedCount">-</div>
                <div class="stat-label">失败</div>
            </div>
        </div>

        <div class="task-list" id="taskList">
            <div class="empty-state">加载中...</div>
        </div>
    </div>

    <script>
        const statusMap = {
            'queued': '排队中',
            'converting': '转换中',
            'completed': '已完成',
            'failed': '失败'
        };

        function refreshTasks() {
            fetch('/tasks')
                .then(r => r.json())
                .then(data => {
                    renderTasks(data.tasks);
                    updateStats(data.tasks);
                })
                .catch(err => {
                    document.getElementById('taskList').innerHTML =
                        '<div class="empty-state">加载失败</div>';
                });
        }

        function updateStats(tasks) {
            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('completedCount').textContent =
                tasks.filter(t => t.status === 'completed').length;
            document.getElementById('failedCount').textContent =
                tasks.filter(t => t.status === 'failed').length;
        }

        function renderTasks(tasks) {
            if (!tasks.length) {
                document.getElementById('taskList').innerHTML =
                    '<div class="empty-state">暂无任务</div>';
                return;
            }

            document.getElementById('taskList').innerHTML = tasks.map(task => `
                <div class="task-item ${task.status}">
                    <div class="task-header">
                        <div>
                            <div class="task-file">${task.file_name}</div>
                            <div class="task-id">ID: ${task.id}</div>
                        </div>
                        <span class="task-status status-${task.status}">
                            ${statusMap[task.status] || task.status}
                        </span>
                    </div>
                    ${task.status !== 'completed' && task.status !== 'failed' ? `
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${task.progress}%"></div>
                    </div>
                    <div class="task-meta">
                        <span>进度: ${task.progress}%</span>
                        <span>知识库: ${task.knowledge_id.substring(0, 8)}...</span>
                    </div>
                    ` : ''}
                    ${task.error ? `
                    <div class="task-error">❌ ${task.error}</div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 初始加载
        refreshTasks();

        // 每3秒自动刷新
        setInterval(refreshTasks, 3000);
    </script>
</body>
</html>
